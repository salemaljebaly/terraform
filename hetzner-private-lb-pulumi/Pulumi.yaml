name: hetzner-private-lb-pulumi
description: Private app server behind a public Hetzner Load Balancer using Pulumi TypeScript
runtime:
  name: nodejs
  options:
    packagemanager: npm
    typescript: true
backend:
  url: file://~
config:
  pulumi:tags:
    value:
      pulumi:template: typescript
  hetzner-private-lb-pulumi:location:
    default: nbg1
  hetzner-private-lb-pulumi:networkZone:
    default: eu-central
  hetzner-private-lb-pulumi:loadBalancerType:
    default: lb11
  hetzner-private-lb-pulumi:serverType:
    default: cx23
  hetzner-private-lb-pulumi:image:
    default: ubuntu-24.04
  hetzner-private-lb-pulumi:networkCidr:
    default: 10.44.0.0/16
  hetzner-private-lb-pulumi:privateSubnetCidr:
    default: 10.44.10.0/24
  hetzner-private-lb-pulumi:loadBalancerPrivateIp:
    default: 10.44.10.10
  hetzner-private-lb-pulumi:appPrivateIp1:
    default: 10.44.10.11
  hetzner-private-lb-pulumi:appPrivateIp2:
    default: 10.44.10.12
